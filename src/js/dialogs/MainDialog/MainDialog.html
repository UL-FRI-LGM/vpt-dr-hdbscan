<ui-sidebar bind="sidebar">
    <div scrollable>
        <ui-tabs>

            <div slot="header">Data</div>
            <div>
                <ui-accordion bind="volumeLoadContainer">
                    <span slot="label">Volume</span>
                </ui-accordion>
                <ui-accordion bind="envmapLoadContainer">
                    <span slot="label">Environment</span>
                </ui-accordion>
            </div>

            <div slot="header">Settings</div>
            <div>
                <ui-accordion>
                    <span slot="label">Renderer</span>
                    <ui-field>
                        <label slot="label">Renderer</label>
                        <select bind="rendererSelect">
                            <option value="mip">Maximum intensity projection</option>
                            <option value="iso">Isosurface extraction</option>
                            <option value="eam">Emission-absorption model</option>
                            <option value="dos">Directional occlusion shading</option>
                            <option value="lao">Local ambient occlusion</option>
                            <option value="mcs">Single scattering</option>
                            <option value="mcm">Multiple scattering</option>
                            <option value="mcm-compute" selected>Multiple scattering (compute)</option>
                            <option value="depth">Depth image</option>
                        </select>
                    </ui-field>
                    <ui-field>
                        <label slot="label">Visualization type</label>
                        <select bind="visselect">
                            <option value="tsne">t-distributed Stochastic Neighbor Embedding</option>
                            <option value="umap">Uniform Manifold Approximation and Projection</option>
                            <option value="basic">Multichannel histogram</option>
                            <option value="perchan">Per channel histogram</option>
                        </select>
                    </ui-field>
                    <ui-field>
                        <label slot="label">t-SNE perplexity</label>
                        <input type="number" bind="tsnePerp" value="5"></input>
                    </ui-field>
                    <ui-field>
                        <label slot="label">t-SNE exageration</label>
                        <input type="number" bind="tsneExag" value="1.0"></input>
                    </ui-field>
                    <ui-field>
                        <label slot="label">t-SNE learning rate</label>
                        <input type="number" bind="tsneLearn" value="100"></input>
                    </ui-field>
                    <ui-field>
                        <label slot="label">t-SNE number of iterations</label>
                        <input type="number" bind="tsneNum" value="200"></input>
                    </ui-field>
                    <ui-field>
                        <label slot="label">UMAP number of neighbors</label>
                        <input type="number" bind="umapNeighbor" value="30"></input>
                    </ui-field>
                    <ui-field>
                        <label slot="label">UMAP minimum distance</label>
                        <input type="number" bind="umapDist" value="0.0"></input>
                    </ui-field>
                    <ui-field>
                        <label slot="label">Sample size (%)</label>
                        <input type="number" bind="sampleSize" value="1"></input>
                    </ui-field>
                    <ui-field>
                        <label slot="label">Sigma value</label>
                        <input type="number" bind="sigmaValue" value="1.5"></input>
                    </ui-field>
                    <ui-field>
                        <label slot="label">HDBSCAN cluster size</label>
                        <input type="number" bind="hdbsCluster" value="100"></input>
                    </ui-field>
                    <ui-field>
                        <label slot="label">HDBSCAN min sample size</label>
                        <input type="number" bind="hdbsSample" value="5"></input>
                    </ui-field>
                    <ui-field>
                        <label slot="label">Compute cluster visualization</label>
                        <button bind="compute">Start</button>
                    </ui-field>
                    <ui-field>
                        <label slot="label">Min cut planes</label>
                        <input type="number" bind="minX" value="0.0" step="0.01" min="0.0" max="1.0"></input>
                        <input type="number" bind="minY" value="0.0" step="0.01" min="0.0" max="1.0"></input>
                        <input type="number" bind="minZ" value="0.0" step="0.01" min="0.0" max="1.0"></input>
                    </ui-field>
                    <ui-field>
                        <label slot="label">Max cut planes</label>
                        <input type="number" bind="maxX" value="1.0" step="0.01" min="0.0" max="1.0"></input>
                        <input type="number" bind="maxY" value="1.0" step="0.01" min="0.0" max="1.0"></input>
                        <input type="number" bind="maxZ" value="1.0" step="0.01" min="0.0" max="1.0"></input>
                    </ui-field>
                    <ui-field>
                        <label slot="label">View cut distance</label>
                        <input type="number" bind="cutDistance" value="0.0" step="0.05" min="0.0" max="1.0"></input>
                    </ui-field>
                    <div bind="rendererSettingsContainer"></div>
                </ui-accordion>
                <ui-accordion>
                    <span slot="label">Tone mapper</span>
                    <ui-field>
                        <label slot="label">Tone mapper</label>
                        <select bind="toneMapperSelect">
                            <option value="artistic" selected>Artistic</option>
                            <option value="range">Range</option>
                            <option value="reinhard">Reinhard</option>
                            <option value="reinhard2">Reinhard 2</option>
                            <option value="uncharted2">Uncharted 2</option>
                            <option value="filmic">Filmic</option>
                            <option value="unreal">Unreal</option>
                            <option value="aces">Aces</option>
                            <option value="lottes">Lottes</option>
                            <option value="uchimura">Uchimura</option>
                        </select>
                    </ui-field>
                    <div bind="toneMapperSettingsContainer"></div>
                </ui-accordion>
                <ui-accordion bind="renderingContextSettingsContainer">
                    <span slot="label">Context</span>
                </ui-accordion>
                <ui-accordion>
                    <span slot="label">Record animation</span>
                    <ui-field>
                        <label slot="label">Start time (sec)</label>
                        <input type="number" bind="startTime" value="0"></input>
                    </ui-field>
                    <ui-field>
                        <label slot="label">End time (sec)</label>
                        <input type="number" bind="endTime" value="1"></input>
                    </ui-field>
                    <ui-field>
                        <label slot="label">Render time per frame (sec)</label>
                        <input type="number" bind="frameTime" value="1" min="0"></input>
                    </ui-field>
                    <ui-field>
                        <label slot="label">FPS</label>
                        <input type="number" bind="fps" value="30" min="0"></input>
                    </ui-field>
                    <ui-field>
                        <label slot="label">Output type</label>
                        <select bind="type">
                            <option value="video">Video (not working yet)</option>
                            <option value="images" selected>Image sequence</option>
                        </select>
                    </ui-field>
                    <ui-field>
                        <button bind="record">Record</button>
                    </ui-field>
                    <ui-field>
                        <ui-progress-bar bind="animationProgress" value="0"></ui-progress-bar>
                    </ui-field>
                </ui-accordion>
            </div>

            <div slot="header">About</div>
            <div bind="about">
            </div>

        </ui-tabs>
    </div>
</ui-sidebar>
